name: Bug Report
description: Report a bug in BioPipe-CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

  - type: input
    id: version
    attributes:
      label: BioPipe-CLI Version
      description: "Run: `biopipe --version`"
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: "Run: `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu/Debian)
        - Linux (CentOS/RHEL)
        - macOS
        - Windows
        - WSL
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        How can we reproduce this? Include the exact `biopipe` command you ran.
      value: |
        1. Run `biopipe generate "..."`
        2. ...
        3. Error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any error messages or logs
      render: shell
