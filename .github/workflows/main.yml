name: Extract biopipe-cli archive

on:
  workflow_dispatch:
  push:
    paths:
      - "*.rar"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install extract tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar p7zip-full rsync

      - name: Find RAR archive
        id: archive
        run: |
          FILE=$(ls *.rar | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No .rar archive found"
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Extract main RAR
        run: |
          rm -rf extracted unpacked current versions archives
          mkdir -p extracted unpacked current versions archives

          unrar x -o+ "${{ steps.archive.outputs.file }}" extracted/

      - name: Remove main wrapper folder
        run: |
          shopt -s dotglob

          if [ -d "extracted/biopipe-cli" ]; then
            mv extracted/biopipe-cli/* unpacked/
          else
            mv extracted/* unpacked/
          fi

      - name: Move current project to current folder
        run: |
          shopt -s dotglob

          mkdir -p current

          for item in unpacked/* unpacked/.[!.]* unpacked/..?*; do
            [ -e "$item" ] || continue

            case "$(basename "$item")" in
              "biopipe-cli-v0.4.0.zip"|"biopipe-cli-v0.5.0-Enterprise.zip"|"biopipe-cli-v0.5.0-GitHub-Ready.zip")
                ;;
              *)
                mv "$item" current/
                ;;
            esac
          done

      - name: Extract v0.4.0
        run: |
          mkdir -p versions/v0.4.0

          if [ -f "unpacked/biopipe-cli-v0.4.0.zip" ]; then
            7z x -y "unpacked/biopipe-cli-v0.4.0.zip" -oversions/v0.4.0
          fi

      - name: Extract v0.5.0 Enterprise
        run: |
          mkdir -p versions/v0.5.0-enterprise

          if [ -f "unpacked/biopipe-cli-v0.5.0-Enterprise.zip" ]; then
            7z x -y "unpacked/biopipe-cli-v0.5.0-Enterprise.zip" -oversions/v0.5.0-enterprise
          fi

      - name: Extract v0.5.0 GitHub Ready
        run: |
          mkdir -p versions/v0.5.0-github-ready

          if [ -f "unpacked/biopipe-cli-v0.5.0-GitHub-Ready.zip" ]; then
            7z x -y "unpacked/biopipe-cli-v0.5.0-GitHub-Ready.zip" -oversions/v0.5.0-github-ready
          fi

      - name: Normalize Windows backslash paths
        run: |
          normalize_paths() {
            TARGET="$1"

            python3 - <<PY
from pathlib import Path
import shutil

root = Path("$TARGET")
if not root.exists():
    raise SystemExit(0)

items = sorted([p for p in root.rglob("*") if "\\\\" in p.name], key=lambda p: len(p.parts), reverse=True)

for p in items:
    rel_parts = p.name.split("\\\\")
    dest = p.parent.joinpath(*rel_parts)
    dest.parent.mkdir(parents=True, exist_ok=True)
    if dest.exists():
        if dest.is_dir() and p.is_dir():
            for child in p.iterdir():
                shutil.move(str(child), str(dest / child.name))
            p.rmdir()
        else:
            p.unlink() if p.is_file() else shutil.rmtree(p)
    else:
        shutil.move(str(p), str(dest))
PY
          }

          normalize_paths versions/v0.4.0
          normalize_paths versions/v0.5.0-enterprise
          normalize_paths versions/v0.5.0-github-ready

      - name: Flatten version wrapper folders
        run: |
          flatten_dir() {
            TARGET="$1"

            DIR_COUNT=$(find "$TARGET" -mindepth 1 -maxdepth 1 -type d | wc -l)
            FILE_COUNT=$(find "$TARGET" -mindepth 1 -maxdepth 1 -type f | wc -l)

            if [ "$DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
              INNER=$(find "$TARGET" -mindepth 1 -maxdepth 1 -type d | head -n 1)
              TEMP="${TARGET}_tmp"

              mkdir -p "$TEMP"
              shopt -s dotglob
              mv "$INNER"/* "$TEMP"/
              rm -rf "$TARGET"
              mv "$TEMP" "$TARGET"
            fi
          }

          flatten_dir versions/v0.4.0
          flatten_dir versions/v0.5.0-enterprise
          flatten_dir versions/v0.5.0-github-ready

      - name: Save original ZIP archives
        run: |
          mkdir -p archives

          mv unpacked/biopipe-cli-v0.4.0.zip archives/ 2>/dev/null || true
          mv unpacked/biopipe-cli-v0.5.0-Enterprise.zip archives/ 2>/dev/null || true
          mv unpacked/biopipe-cli-v0.5.0-GitHub-Ready.zip archives/ 2>/dev/null || true

      - name: Remove source RAR archive
        run: |
          rm -f "${{ steps.archive.outputs.file }}"

      - name: Show final structure
        run: |
          echo "=== current ==="
          find current -maxdepth 2 -type d | sort

          echo "=== versions ==="
          find versions -maxdepth 3 -type d | sort

          echo "=== archives ==="
          find archives -maxdepth 1 -type f | sort || true

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Extract biopipe-cli versions" || echo "No changes"
          git push
