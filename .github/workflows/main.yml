name: Extract biopipe-cli archive

on:
  workflow_dispatch:
    inputs:
      archive:
        description: "RAR archive filename in repository root"
        required: false
        default: "biopipe-cli.rar"
  push:
    paths:
      - "*.rar"

permissions:
  contents: write

concurrency:
  group: extract-biopipe-cli
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar p7zip-full rsync

      - name: Find archive
        id: archive
        env:
          ARCHIVE_INPUT: ${{ inputs.archive }}
        run: |
          FILE=""

          if [ -n "$ARCHIVE_INPUT" ] && [ -f "$ARCHIVE_INPUT" ]; then
            FILE="$ARCHIVE_INPUT"
          else
            FILE=$(find . -maxdepth 1 -type f -name "*.rar" | head -n 1 | sed 's#^./##')
          fi

          if [ -z "$FILE" ]; then
            echo "No .rar archive found. Nothing to extract."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Using archive: $FILE"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Extract main RAR into workspace
        if: steps.archive.outputs.skip != 'true'
        run: |
          rm -rf _extract_work
          mkdir -p _extract_work/raw

          if command -v unrar >/dev/null 2>&1; then
            unrar x -o+ "${{ steps.archive.outputs.file }}" _extract_work/raw/
          else
            7z x -y "${{ steps.archive.outputs.file }}" -o_extract_work/raw
          fi

      - name: Sync extracted project to repository root
        if: steps.archive.outputs.skip != 'true'
        run: |
          RAW="_extract_work/raw"

          if [ -d "$RAW/biopipe-cli" ]; then
            PROJECT_ROOT="$RAW/biopipe-cli"
          else
            DIR_COUNT=$(find "$RAW" -mindepth 1 -maxdepth 1 -type d | wc -l)
            FILE_COUNT=$(find "$RAW" -mindepth 1 -maxdepth 1 -type f | wc -l)

            if [ "$DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
              PROJECT_ROOT=$(find "$RAW" -mindepth 1 -maxdepth 1 -type d | head -n 1)
            else
              PROJECT_ROOT="$RAW"
            fi
          fi

          python3 - <<'PY'
          from pathlib import Path
          import shutil

          def normalize_backslash_names(root: Path) -> None:
              if not root.exists():
                  return

              items = sorted(
                  [p for p in root.rglob("*") if "\\" in p.name],
                  key=lambda p: len(p.parts),
                  reverse=True,
              )

              for path in items:
                  parts = [part for part in path.name.split("\\") if part]
                  if not parts:
                      continue

                  destination = path.parent.joinpath(*parts)
                  destination.parent.mkdir(parents=True, exist_ok=True)

                  if destination.exists():
                      if destination.is_dir() and path.is_dir():
                          for child in path.iterdir():
                              shutil.move(str(child), str(destination / child.name))
                          path.rmdir()
                      else:
                          if destination.is_dir():
                              shutil.rmtree(destination)
                          else:
                              destination.unlink()
                          shutil.move(str(path), str(destination))
                  else:
                      shutil.move(str(path), str(destination))

          normalize_backslash_names(Path("_extract_work/raw"))
          PY

          rsync -a "$PROJECT_ROOT/" ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/main.yml'

      - name: Extract old ZIP versions into versions/
        if: steps.archive.outputs.skip != 'true'
        run: |
          python3 - <<'PY'
          from pathlib import Path, PurePosixPath
          import shutil
          import zipfile

          repo = Path(".")
          versions = repo / "versions"
          archives = repo / "archives"
          versions.mkdir(parents=True, exist_ok=True)
          archives.mkdir(parents=True, exist_ok=True)

          zip_map = {
              "biopipe-cli-v0.4.0.zip": versions / "v0.4.0",
              "biopipe-cli-v0.5.0-Enterprise.zip": versions / "v0.5.0-enterprise",
              "biopipe-cli-v0.5.0-GitHub-Ready.zip": versions / "v0.5.0-github-ready",
          }

          def clean_target(path: Path) -> None:
              if path.exists():
                  shutil.rmtree(path)
              path.mkdir(parents=True, exist_ok=True)

          def normalize_members(zf: zipfile.ZipFile):
              normalized = []
              for info in zf.infolist():
                  name = info.filename.replace("\\", "/")
                  parts = []
                  for part in PurePosixPath(name).parts:
                      if part in ("", ".", "/"):
                          continue
                      if part == "..":
                          raise RuntimeError(f"Unsafe path in zip: {info.filename}")
                      parts.append(part)
                  if parts:
                      normalized.append((info, parts))
              return normalized

          def strip_common_wrapper(entries):
              first_parts = [parts[0] for _, parts in entries if len(parts) > 0]
              if not first_parts:
                  return entries
              candidate = first_parts[0]
              if all(parts[0] == candidate and len(parts) > 1 for _, parts in entries):
                  return [(info, parts[1:]) for info, parts in entries]
              return entries

          for zip_name, target_dir in zip_map.items():
              zip_path = repo / zip_name
              if not zip_path.exists():
                  print(f"Missing ZIP in repository root: {zip_name}")
                  continue

              shutil.copy2(zip_path, archives / zip_name)
              clean_target(target_dir)

              with zipfile.ZipFile(zip_path) as zf:
                  entries = strip_common_wrapper(normalize_members(zf))
                  for info, parts in entries:
                      destination = target_dir.joinpath(*parts)

                      is_dir = info.is_dir() or info.filename.endswith(("/", "\\"))
                      if is_dir:
                          destination.mkdir(parents=True, exist_ok=True)
                          continue

                      destination.parent.mkdir(parents=True, exist_ok=True)
                      with zf.open(info) as src, open(destination, "wb") as dst:
                          shutil.copyfileobj(src, dst)

          print("ZIP extraction completed")
          PY

      - name: Show final structure
        if: steps.archive.outputs.skip != 'true'
        run: |
          echo "=== repository root ==="
          find . -maxdepth 2 -mindepth 1 | sort

          echo "=== versions ==="
          find versions -maxdepth 3 -mindepth 1 | sort || true

      - name: Cleanup temporary extraction workspace
        if: steps.archive.outputs.skip != 'true'
        run: rm -rf _extract_work

      - name: Commit extracted files
        if: steps.archive.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract biopipe archive to repository root"
            git push
          fi
